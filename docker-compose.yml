services:
  logiq-server:
    build:
      context: .
      target: server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://logiq:logiq@db:5432/logiq?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: 8080
    depends_on:
      - db
      - redis

  logiq-worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgres://logiq:logiq@db:5432/logiq?sslmode=disable
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 2
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: logiq
      POSTGRES_PASSWORD: logiq
      POSTGRES_DB: logiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
  redisdata:
